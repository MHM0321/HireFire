spring.application.name=HireFireBackend

# Server configuration
server.port=8080

# JazzCash Configuration
jazzcash.merchant.id=YOUR_MERCHANT_ID
jazzcash.password=YOUR_MERCHANT_PASSWORD
jazzcash.return.url=https://your-app-domain.com/api/payments/jazzcash/callback
jazzcash.api.url=https://sandbox.jazzcash.com.pk/CustomerPortal/transactionmanagement/merchantform
jazzcash.hash.key=YOUR_HASH_KEY
jazzcash.integritySalt=YOUR_INTEGRITY_SALT

# Mobile app configuration
app.notification.enabled=true
app.payment.confirmation.timeout=600

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration